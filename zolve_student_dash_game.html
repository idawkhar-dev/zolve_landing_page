
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; }

  #game-wrap {
    font-family: var(--font-sans);
    background: #F4F1FF;
    border-radius: 20px;
    padding: 0;
    overflow: hidden;
    width: 100%;
    max-width: 680px;
  }

  #top-bar {
    background: #6B5CE7;
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #top-bar .logo { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
  #top-bar .logo span { color: #F4A14A; }

  #status-msg {
    font-size: 12px;
    background: rgba(255,255,255,0.2);
    padding: 4px 12px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .pulse-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #F4A14A;
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

  #score-bar {
    background: #EDE8FF;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #6B5CE7;
    font-weight: 500;
  }

  #score-bar .stat { display: flex; align-items: center; gap: 6px; }

  canvas {
    display: block;
    width: 100%;
    background: #FAF8FF;
    cursor: pointer;
  }

  #bottom-panel {
    background: #6B5CE7;
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #timer-wrap { display: flex; align-items: center; gap: 10px; }
  #timer-label { font-size: 12px; opacity: 0.8; }
  #timer-bar-bg { width: 140px; height: 6px; background: rgba(255,255,255,0.25); border-radius: 3px; }
  #timer-bar { height: 6px; background: #F4A14A; border-radius: 3px; transition: width 1s linear; width: 100%; }
  #timer-num { font-size: 13px; font-weight: 600; min-width: 40px; }

  #ready-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(107,92,231,0.92);
    border-radius: 20px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    gap: 12px;
    z-index: 10;
  }

  #ready-overlay.show { display: flex; }
  #ready-overlay h2 { font-size: 26px; font-weight: 600; }
  #ready-overlay p { font-size: 14px; opacity: 0.85; max-width: 260px; line-height: 1.5; }
  #ready-btn {
    margin-top: 8px;
    background: #F4A14A;
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    animation: bob 1.5s ease-in-out infinite;
  }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

  #wrap-rel { position: relative; }
</style>

<div id="game-wrap">
  <div id="top-bar">
    <div class="logo">zolve<span>.</span></div>
    <div id="status-msg">
      <div class="pulse-dot"></div>
      <span>Setting up your account…</span>
    </div>
  </div>

  <div id="score-bar">
    <div class="stat">💰 Dollars caught: <strong id="score-disp">0</strong></div>
    <div class="stat">🏆 High score: <strong id="hi-disp">0</strong></div>
    <div class="stat" style="font-size:12px; opacity:0.7;">↑ / Space / tap to jump</div>
  </div>

  <div id="wrap-rel">
    <canvas id="gc" height="180"></canvas>
    <div id="ready-overlay">
      <div style="font-size:48px;">🎉</div>
      <h2>You're all set!</h2>
      <p>Our servers caught up. Your Zolve account is ready to roll.</p>
      <button id="ready-btn" onclick="continueOnboarding()">Continue onboarding →</button>
    </div>
  </div>

  <div id="bottom-panel">
    <div id="timer-wrap">
      <span id="timer-label">Back in ~</span>
      <div id="timer-bar-bg"><div id="timer-bar"></div></div>
      <span id="timer-num">60s</span>
    </div>
    <div style="font-size:12px; opacity:0.8;">Too many students in line 😄 Hang tight!</div>
  </div>
</div>

<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');

canvas.width = 680;
canvas.height = 180;

const GROUND = 140;
const GRAVITY = 0.55;
const JUMP_V = -11;

let student = { x: 80, y: GROUND, vy: 0, onGround: true, frame: 0, frameTimer: 0 };
let dollars = [];
let obstacles = [];
let score = 0;
let hiScore = 0;
let gameOver = false;
let bgOffset = 0;
let spawnTimer = 0;
let obsTimer = 0;
let particles = [];

function drawStudent(x, y, frame) {
  const cx = x + 18, cy = y;
  ctx.save();

  const legPhase = frame % 2 === 0 ? 1 : -1;

  if (!student.onGround) {
    ctx.fillStyle = '#6B5CE7';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 28, 6, 10, Math.PI * 0.15 * legPhase, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx, cy + 28, 6, 10, -Math.PI * 0.15 * legPhase, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillStyle = '#6B5CE7';
    ctx.beginPath();
    ctx.ellipse(cx - 3, cy + 28, 5, 10, Math.PI * 0.2 * legPhase, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 3, cy + 28, 5, 10, -Math.PI * 0.2 * legPhase, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = '#6B5CE7';
  ctx.beginPath();
  ctx.roundRect(cx - 12, cy + 2, 24, 28, 6);
  ctx.fill();

  ctx.fillStyle = '#EDE8FF';
  ctx.beginPath();
  ctx.roundRect(cx - 8, cy + 6, 16, 18, 4);
  ctx.fill();

  ctx.fillStyle = '#3D2D99';
  ctx.font = 'bold 9px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Z', cx, cy + 19);

  const armAngle = student.onGround ? Math.sin(frame * 0.4) * 0.3 : -0.6;
  ctx.strokeStyle = '#6B5CE7';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - 10, cy + 10);
  ctx.lineTo(cx - 18, cy + 18 + Math.sin(armAngle) * 6);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + 10, cy + 10);
  ctx.lineTo(cx + 18, cy + 18 - Math.sin(armAngle) * 6);
  ctx.stroke();

  ctx.fillStyle = '#FFCF8B';
  ctx.beginPath();
  ctx.arc(cx, cy - 4, 10, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#F4A14A';
  ctx.beginPath();
  ctx.arc(cx, cy - 12, 12, Math.PI, 0);
  ctx.fill();

  ctx.fillStyle = '#3D2D99';
  ctx.beginPath();
  ctx.roundRect(cx - 13, cy - 15, 26, 6, 2);
  ctx.fill();

  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(cx - 3, cy - 3, 1.5, 0, Math.PI * 2);
  ctx.arc(cx + 3, cy - 3, 1.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawDollar(d) {
  ctx.save();
  ctx.translate(d.x + 14, d.y + 14);
  ctx.rotate(d.rot);

  ctx.fillStyle = '#22C55E';
  ctx.beginPath();
  ctx.roundRect(-14, -10, 28, 20, 4);
  ctx.fill();

  ctx.fillStyle = '#15803D';
  ctx.beginPath();
  ctx.roundRect(-14, -10, 28, 20, 4);
  ctx.stroke = '#15803D';
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = '#15803D';
  ctx.stroke();

  ctx.fillStyle = 'white';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('$', 0, 0);
  ctx.restore();
}

function drawObstacle(o) {
  ctx.save();
  ctx.fillStyle = '#F4A14A';
  ctx.beginPath();
  ctx.roundRect(o.x, GROUND - o.h + 36, o.w, o.h, [4, 4, 0, 0]);
  ctx.fill();
  ctx.fillStyle = '#D97706';
  ctx.font = '18px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('📚', o.x + o.w / 2, GROUND - o.h + 26);
  ctx.restore();
}

function spawnDollar() {
  const y = GROUND - 20 - Math.random() * 60;
  dollars.push({ x: 680, y, vy: -1 - Math.random(), rot: 0, rotV: 0.05 - Math.random() * 0.1 });
}

function spawnObstacle() {
  const h = 30 + Math.random() * 30;
  obstacles.push({ x: 680, w: 22, h });
}

function addParticle(x, y) {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: -2 - Math.random() * 3,
      life: 1,
      color: ['#22C55E','#F4A14A','#6B5CE7','#FFCF8B'][Math.floor(Math.random()*4)]
    });
  }
}

function jump() {
  if (student.onGround && !gameOver) {
    student.vy = JUMP_V;
    student.onGround = false;
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
});
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });

function drawBackground() {
  ctx.fillStyle = '#FAF8FF';
  ctx.fillRect(0, 0, 680, 180);

  ctx.strokeStyle = '#EDE8FF';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 8]);
  for (let i = 0; i < 5; i++) {
    const x = ((bgOffset * 0.3 + i * 160) % 800) - 120;
    ctx.beginPath();
    ctx.moveTo(x, 40);
    ctx.lineTo(x + 60, 40);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  ctx.fillStyle = '#EDE8FF';
  ctx.beginPath();
  ctx.roundRect(((bgOffset * 0.15 + 300) % 800) - 120, 20, 60, 30, 15);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(((bgOffset * 0.15 + 600) % 800) - 120, 30, 80, 25, 13);
  ctx.fill();

  ctx.strokeStyle = '#D8D0FF';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND + 36);
  ctx.lineTo(680, GROUND + 36);
  ctx.stroke();

  ctx.strokeStyle = '#EDE8FF';
  ctx.lineWidth = 1;
  for (let i = 0; i < 20; i++) {
    const x = ((bgOffset + i * 40) % 800) - 40;
    ctx.beginPath();
    ctx.moveTo(x, GROUND + 36);
    ctx.lineTo(x + 20, GROUND + 36);
    ctx.stroke();
  }
}

let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 16, 3);
  lastTime = ts;

  bgOffset += 2 * dt;

  if (!gameOver) {
    student.vy += GRAVITY * dt;
    student.y += student.vy * dt;
    if (student.y >= GROUND) { student.y = GROUND; student.vy = 0; student.onGround = true; }
    student.frameTimer += dt;
    if (student.frameTimer > 6) { student.frame++; student.frameTimer = 0; }

    spawnTimer += dt;
    if (spawnTimer > 50) { spawnDollar(); spawnTimer = 0; }
    obsTimer += dt;
    if (obsTimer > 120 + Math.random() * 60) { spawnObstacle(); obsTimer = 0; }

    dollars.forEach(d => { d.x -= 3 * dt; d.rot += d.rotV * dt; });
    obstacles.forEach(o => { o.x -= 3 * dt; });

    dollars = dollars.filter(d => {
      const sx = student.x + 6, sy = student.y - 30, sw = 24, sh = 40;
      if (d.x + 28 > sx && d.x < sx + sw && d.y + 20 > sy && d.y < sy + sh) {
        score++;
        if (score > hiScore) hiScore = score;
        document.getElementById('score-disp').textContent = score;
        document.getElementById('hi-disp').textContent = hiScore;
        addParticle(d.x + 14, d.y + 14);
        return false;
      }
      return d.x > -40;
    });

    obstacles.forEach(o => {
      const sx = student.x + 10, sy = student.y - 30, sw = 16, sh = 40;
      if (o.x + o.w - 4 > sx && o.x + 4 < sx + sw && GROUND - o.h + 36 < sy + sh) {
        gameOver = true;
        setTimeout(() => { gameOver = false; obstacles = []; dollars = []; student.y = GROUND; student.vy = 0; }, 1200);
      }
    });
    obstacles = obstacles.filter(o => o.x > -40);
  }

  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.04;
  });
  particles = particles.filter(p => p.life > 0);

  ctx.clearRect(0, 0, 680, 180);
  drawBackground();

  if (gameOver) {
    ctx.save();
    ctx.fillStyle = 'rgba(107,92,231,0.15)';
    ctx.fillRect(0, 0, 680, 180);
    ctx.fillStyle = '#6B5CE7';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Oops! Watch out for the textbooks! 📚', 340, 90);
    ctx.font = '14px sans-serif';
    ctx.fillStyle = '#9585EF';
    ctx.fillText('Tap or press space to try again', 340, 115);
    ctx.restore();
  } else {
    dollars.forEach(drawDollar);
    obstacles.forEach(drawObstacle);
    drawStudent(student.x, student.y, student.frame);
  }

  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

let totalSecs = 60;
let remaining = totalSecs;
const timerBar = document.getElementById('timer-bar');
const timerNum = document.getElementById('timer-num');
const overlay = document.getElementById('ready-overlay');

const countdown = setInterval(() => {
  remaining--;
  timerNum.textContent = remaining + 's';
  timerBar.style.width = (remaining / totalSecs * 100) + '%';
  if (remaining <= 10) timerBar.style.background = '#22C55E';
  if (remaining <= 0) {
    clearInterval(countdown);
    overlay.classList.add('show');
  }
}, 1000);

function continueOnboarding() {
  overlay.classList.remove('show');
  document.getElementById('status-msg').innerHTML = '<span style="color:#86EFAC">✓ Account ready!</span>';
}
</script>
